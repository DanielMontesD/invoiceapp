{% extends "base.html" %}
{% block title %}Sign in{% endblock %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-12 col-sm-10 col-md-8 col-lg-5">
    <div class="card">
      <div class="card-header text-center">Sign in to your account</div>
      <div class="card-body">
        {% if messages %}
          {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
          {% endfor %}
        {% endif %}

        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" name="username" autocomplete="username" required>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" autocomplete="current-password" required>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary">Sign in</button>
          </div>
        </form>

        <div class="text-center mt-3" style="font-size:14px;">
          <p class="mb-1"><a href="{% url 'password_reset' %}" style="color:var(--color-accent);">Forgot your password?</a></p>
          <p class="mb-0 text-muted">Don't have an account? <a href="{% url 'register' %}" style="color:var(--color-accent);">Register</a></p>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
