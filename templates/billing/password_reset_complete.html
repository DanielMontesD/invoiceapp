{% extends "base.html" %}
{% block title %}Password changed{% endblock %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-12 col-sm-10 col-md-8 col-lg-5">
    <div class="card">
      <div class="card-header text-center">Password changed</div>
      <div class="card-body text-center">
        <p style="font-size:14px;">Your password has been set. You can now sign in with your new password.</p>
        <a href="{% url 'login' %}" class="btn btn-primary">Sign in</a>
      </div>
    </div>
  </div>
</div>

{% endblock %}
