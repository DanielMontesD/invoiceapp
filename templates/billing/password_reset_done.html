{% extends "base.html" %}
{% block title %}Check Your Email{% endblock %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3 class="text-center">Check Your Email</h3>
                </div>
                <div class="card-body text-center">
                    <p>If an account with that email exists, we've sent a password reset link. Check your inbox (and spam folder).</p>
                    <a href="{% url 'login' %}" class="btn btn-primary">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
