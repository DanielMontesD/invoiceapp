{% extends "base.html" %}
{% block title %}Check your email{% endblock %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-12 col-sm-10 col-md-8 col-lg-5">
    <div class="card">
      <div class="card-header text-center">Check your email</div>
      <div class="card-body text-center">
        <p style="font-size:14px;">If an account with that email exists, we've sent a password reset link. Check your inbox (and spam folder).</p>
        <a href="{% url 'login' %}" class="btn btn-primary">Back to sign in</a>
      </div>
    </div>
  </div>
</div>

{% endblock %}
