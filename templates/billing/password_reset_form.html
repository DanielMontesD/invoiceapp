{% extends "base.html" %}
{% block title %}Reset password{% endblock %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-12 col-sm-10 col-md-8 col-lg-5">
    <div class="card">
      <div class="card-header text-center">Reset your password</div>
      <div class="card-body">
        <p class="text-muted" style="font-size:14px;">Enter the email address linked to your account and we'll send you a reset link.</p>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label for="id_email" class="form-label">Email address</label>
            <input type="email" class="form-control" id="id_email" name="email" autocomplete="email" required>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary">Send reset link</button>
          </div>
        </form>
        <div class="text-center mt-3" style="font-size:14px;">
          <a href="{% url 'login' %}" style="color:var(--color-accent);">Back to sign in</a>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
